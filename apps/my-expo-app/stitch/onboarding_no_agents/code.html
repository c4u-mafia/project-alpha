<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "surface-dim": "#d9dadb",
                    "outline": "#6f797a",
                    "tertiary": "#713d10",
                    "secondary-fixed": "#c6e7ff",
                    "primary-fixed": "#9ff0fb",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f3f4f5",

                    "inverse-surface": "#2e3132",

                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "surface-bright": "#f8f9fa",

                    "tertiary-fixed-dim": "#ffb783",
                    "error": "#ba1a1a",

                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(180deg, rgba(248, 249, 250, 0) 0%, rgba(248, 249, 250, 1) 85%);
        }
        .cta-gradient {
            background: linear-gradient(135deg, #00535b 0%, #006d77 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Suppression of Nav Shells as per Destination Rule for Onboarding -->
<main class="relative h-screen w-full flex flex-col overflow-hidden">
<!-- Hero Visual Section -->
<div class="relative flex-[1.4] w-full overflow-hidden">
<img alt="Modern Nigerian Living Room" class="absolute inset-0 w-full h-full object-cover" data-alt="Luxurious modern Nigerian living room in Lagos with floor-to-ceiling windows, high-end furniture, warm sunlight streaming through, and vibrant African textures." src="https://lh3.googleusercontent.com/aida-public/AB6AXuATQrHr3nGswkwdOAacZDTcPSx7DuJ6kMDCO7ILex3_N2HWTgnhlXnURSavHmwfnFDb0X1T3vg_V0tUThJT0MGN9KoueidfLcOXjR2P7LFE7wIAniHKtU19U99egfc8Rl5m2cOJWq0edRBjSjkLJFQ3kzsXaBUhmgiuXuHxHHm4VGZYaiN2lN1_tv1F4j90fZncm7I6ktBPUz6_X69xnvv4W4UTvIwlQJvAq5rFm-9JUxyqE5xyDe2zhAk7F3qBPgdUdDpfWralyAEF"/>
<!-- Glass Header Overlay -->
<div class="absolute top-0 left-0 w-full px-6 py-10 flex justify-between items-center z-20">
<div class="text-2xl font-headline font-black text-white tracking-tighter drop-shadow-md">
                    RentDirect
                </div>
<button class="bg-white/10 backdrop-blur-md px-5 py-2 rounded-full text-white font-label font-bold text-sm tracking-wide border border-white/20 active:scale-95 transition-transform">
                    Skip
                </button>
</div>
<!-- Overlapping Property Chip (Asymmetric Detail) -->
<div class="absolute bottom-12 left-6 z-20">
<div class="bg-primary-container text-on-primary-container px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest shadow-lg">
                    Direct To Landlord
                </div>
</div>
<!-- Fade to Content -->
<div class="absolute bottom-0 left-0 w-full h-40 editorial-gradient z-10"></div>
</div>
<!-- Content Section -->
<div class="flex-1 bg-surface px-8 pt-6 pb-12 flex flex-col justify-between items-start z-20">
<div class="space-y-6 max-w-md">
<!-- Onboarding Indicator -->
<div class="flex gap-2">
<div class="h-1.5 w-10 rounded-full bg-primary"></div>
<div class="h-1.5 w-4 rounded-full bg-surface-variant"></div>
<div class="h-1.5 w-4 rounded-full bg-surface-variant"></div>
</div>
<div class="space-y-3">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold text-on-surface leading-[1.1] tracking-tight">
                        No Agents,<br/>No Hassle.
                    </h1>
<p class="text-on-surface-variant text-lg font-medium leading-relaxed max-w-[90%]">
                        We’ve cut out the middleman. Chat directly with landlords and close deals in minutes, not days.
                    </p>
</div>
</div>
<!-- Actions Container -->
<div class="w-full space-y-4 pt-8">
<!-- Floating Primary Action -->
<button class="cta-gradient w-full h-[56px] rounded-3xl flex items-center justify-between px-8 text-white font-headline font-bold text-lg shadow-[0_8px_24px_rgba(0,83,91,0.15)] active:scale-95 transition-transform group">
<span>Next</span>
<span class="material-symbols-outlined text-white transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex justify-center w-full">
<p class="text-outline text-xs font-semibold uppercase tracking-[0.2em]">
                        Your urban sanctuary awaits
                    </p>
</div>
</div>
</div>
<!-- Decorative Elements for "Urban Curator" Aesthetic -->
<div class="absolute -right-20 top-1/2 w-40 h-40 bg-secondary-container/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -left-10 bottom-0 w-32 h-32 bg-primary/5 rounded-full blur-2xl pointer-events-none"></div>
</main>
</body></html>
